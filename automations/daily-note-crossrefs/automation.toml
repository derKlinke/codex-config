version = 1
id = "daily-note-crossrefs"
name = "Daily Note Crossrefs"
prompt = "Scan the notes corpus for missing in-text wikilink cross references between related notes, limited to Wikipedia-style inline links in prose. Ignore manual related-notes sections, metadata lists, and explicit patterns like `(related to [[...]] )`. Propose or apply only small, local rewrites when they improve prose and naturally introduce a precise inline wikilink. Prefer canonical note slugs and avoid speculative or weak links. Report concrete note/file findings, suggested edits, and any applied rewrites."
